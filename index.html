<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review Bot</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --ink: #15171a;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #18794e;
        --accent-strong: #11663f;
        --danger: #b42318;
        --shadow: 0 16px 48px rgba(31, 41, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subcopy {
        margin: 0;
        max-width: 660px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
        gap: 18px;
        align-items: start;
      }

      section,
      aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      form {
        padding: 22px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #344054;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        height: 44px;
        border: 1px solid #c7d0dd;
        border-radius: 6px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(24, 121, 78, 0.18);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .field {
        margin-bottom: 16px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 6px;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
      }

      aside {
        padding: 20px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .steps {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .steps li {
        padding: 12px;
        border: 1px solid #e4e9f1;
        border-radius: 6px;
        background: #fbfcfe;
        color: #475467;
        font-size: 14px;
        line-height: 1.45;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        main {
          padding: 28px 0;
        }

        .workspace,
        .grid {
          grid-template-columns: 1fr;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Review Bot</h1>
        <p class="subcopy">
          앱 이름을 입력하면 Play Store와 App Store 리뷰를 수집해 엑셀 파일로 다운로드합니다.
        </p>
      </header>

      <div class="workspace">
        <section>
          <form id="review-form">
            <div class="field">
              <label for="app-name">앱 이름</label>
              <input id="app-name" name="app_name" autocomplete="off" placeholder="예: adidas" required />
            </div>

            <div class="grid">
              <div class="field">
                <label for="store">스토어</label>
                <select id="store" name="store">
                  <option value="both">Play Store + App Store</option>
                  <option value="playstore">Play Store</option>
                  <option value="appstore">App Store</option>
                </select>
              </div>

              <div class="field">
                <label for="count">스토어별 리뷰 수</label>
                <input id="count" name="count" type="number" min="1" max="100" value="30" />
              </div>
            </div>

            <div class="grid">
              <div class="field">
                <label for="country">국가</label>
                <input id="country" name="country" value="kr" maxlength="2" />
              </div>

              <div class="field">
                <label for="lang">언어</label>
                <input id="lang" name="lang" value="ko" maxlength="2" />
              </div>
            </div>

            <div class="actions">
              <button id="submit" type="submit">엑셀 다운로드</button>
              <span id="status" class="status" role="status"></span>
            </div>
          </form>
        </section>

        <aside>
          <h2>다운로드 파일</h2>
          <ul class="steps">
            <li>컬럼: source, userName, review, score, date, appVersion, reviewId</li>
            <li>앱 이름 검색이 부정확하면 국가와 언어를 바꿔 다시 실행하세요.</li>
            <li>리뷰 수를 크게 잡으면 배포 환경 제한으로 시간이 걸릴 수 있습니다.</li>
          </ul>
        </aside>
      </div>
    </main>

    <script>
      const form = document.querySelector("#review-form");
      const button = document.querySelector("#submit");
      const status = document.querySelector("#status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const params = new URLSearchParams(data);
        const name = String(data.get("app_name") || "app").trim();

        button.disabled = true;
        status.className = "status";
        status.textContent = "리뷰를 수집하는 중입니다.";

        try {
          const response = await fetch(`/api/reviews?${params.toString()}`);
          if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `HTTP ${response.status}`);
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${name.replace(/[^\w가-힣.-]+/g, "_") || "app"}_reviews.xlsx`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          status.textContent = "다운로드가 시작됐습니다.";
        } catch (error) {
          status.className = "status error";
          status.textContent = error instanceof Error ? error.message : "다운로드에 실패했습니다.";
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
